<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>스포츠지도사 플래시카드</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:#FDF8F5;color:#2C2C2A;font-family:-apple-system,'Segoe UI',sans-serif;min-height:100vh;display:flex;flex-direction:column;max-width:480px;margin:0 auto}
:root{--pink:#F4C0D1;--pink2:#ED93B1;--pink3:#D4537E;--peach:#F5C4B3;--peach2:#F0997B;--mint:#9FE1CB;--mint2:#1D9E75;--purple:#CECBF6;--purple2:#7F77DD;--yellow:#FAC775;--bg:#FDF8F5;--surface:#FFFFFF;--surface2:#FFF5F8;--muted:#888780;--text:#2C2C2A;--text2:#5F5E5A;--wrong:#E24B4A;--wrong-bg:#FCEBEB;--radius:20px;--radius-sm:12px}

.header{padding:16px 20px 12px;display:flex;align-items:center;gap:10px;background:#fff;border-bottom:1px solid #F4C0D1}
.logo{font-size:18px;font-weight:700;background:linear-gradient(135deg,#D4537E,#7F77DD);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.mode-pill{margin-left:auto;font-size:11px;font-weight:600;background:#FFF0F5;color:#D4537E;padding:4px 12px;border-radius:20px;border:1px solid #F4C0D1}
.mode-pill.wrong{background:#FCEBEB;color:#A32D2D;border-color:#F7C1C1}

.subjects-wrap{background:#fff;padding:10px 0;border-bottom:1px solid #F9EEF3;position:relative;display:flex;align-items:center}
.scroll-arrow{flex-shrink:0;width:32px;height:32px;display:flex;align-items:center;justify-content:center;background:#fff;border:1.5px solid #F4C0D1;border-radius:50%;cursor:pointer;font-size:14px;color:#D4537E;transition:all .15s;z-index:2;margin:0 6px}
.scroll-arrow:active{background:#FFF0F5;transform:scale(.92)}
.scroll-arrow.disabled{opacity:.3;cursor:default}
.subjects{display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;padding:2px 4px;flex:1}
.subjects::-webkit-scrollbar{display:none}
.subj-btn{flex-shrink:0;padding:7px 14px;border-radius:30px;border:1.5px solid #F4C0D1;background:#fff;color:#888780;font-size:12px;font-weight:600;cursor:pointer;transition:all .18s;white-space:nowrap;position:relative}
.subj-btn.active{border-color:#D4537E;background:linear-gradient(135deg,#F4C0D1,#CECBF6);color:#4B1528}
.subj-btn.has-wrong::after{content:'';position:absolute;top:4px;right:4px;width:6px;height:6px;background:#E24B4A;border-radius:50%;border:1.5px solid #fff}

.progress-wrap{padding:12px 20px 8px}
.progress-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.progress-label{font-size:13px;font-weight:600;color:#2C2C2A}
.progress-right{font-size:12px;color:#888780}
.progress-track{height:6px;background:#F4EEF9;border-radius:6px;overflow:hidden}
.progress-bar{height:100%;background:linear-gradient(90deg,#F4C0D1,#CECBF6);border-radius:6px;transition:width .35s ease}

.counter-strip{display:flex;gap:10px;padding:0 20px 10px}
.c-pill{flex:1;background:#fff;border:1px solid #F4C0D1;border-radius:var(--radius-sm);padding:8px;text-align:center}
.c-pill .v{font-size:18px;font-weight:700;color:#D4537E}
.c-pill .l{font-size:10px;color:#888780;margin-top:1px}
.c-pill.wrong-pill .v{color:#E24B4A}
.c-pill.done-pill .v{color:#7F77DD}

.card-area{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px 20px}
.subj-tag{font-size:11px;font-weight:600;color:#D4537E;background:#FFF0F5;border:1px solid #F4C0D1;padding:3px 10px;border-radius:20px;margin-bottom:10px}

.card-scene{width:100%;perspective:1000px}
.card-inner{position:relative;width:100%;min-height:220px;transform-style:preserve-3d;transition:transform .45s cubic-bezier(.4,0,.2,1);cursor:pointer}
.card-inner.flipped{transform:rotateY(180deg)}
.card-face{position:absolute;width:100%;min-height:220px;backface-visibility:hidden;-webkit-backface-visibility:hidden;border-radius:var(--radius);display:flex;flex-direction:column;justify-content:center;align-items:center;padding:28px 22px;text-align:center}
.card-front{background:#fff;border:2px solid #F4C0D1;box-shadow:0 4px 20px rgba(212,83,126,.08)}
.card-front.is-wrong{border-color:#E24B4A;background:#FFF8F8}
.card-back{background:linear-gradient(135deg,#FFF5F8 0%,#F0EDFF 100%);border:2px solid #CECBF6;transform:rotateY(180deg)}
.card-label{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;margin-bottom:12px;color:#D4537E}
.card-back .card-label{color:#7F77DD}
.card-text{font-size:20px;font-weight:700;line-height:1.55;color:#2C2C2A}
.card-back .card-text{font-size:17px;color:#3C3489}
.wrong-dot{position:absolute;top:14px;right:14px;background:#E24B4A;color:#fff;font-size:11px;font-weight:800;width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center}
.tap-hint{margin-top:12px;font-size:11px;color:#B4B2A9;text-align:center}

.btn-row{display:flex;gap:10px;padding:0 20px 12px;width:100%}
.btn{flex:1;padding:16px 8px;border-radius:var(--radius-sm);border:none;font-size:13px;font-weight:700;cursor:pointer;transition:all .15s;display:flex;flex-direction:column;align-items:center;gap:3px}
.btn .lbl{font-size:10px;font-weight:500;opacity:.75}
.btn:active{transform:scale(.95)}
.btn:disabled{opacity:.3;cursor:not-allowed;transform:none}
.btn-prev{background:#F4EEF9;color:#7F77DD}
.btn-wrong{background:#FFF0F0;color:#E24B4A;border:1.5px solid #F7C1C1}
.btn-wrong.marked{background:#E24B4A;color:#fff;border-color:#E24B4A}
.btn-next{background:linear-gradient(135deg,#F4C0D1,#CECBF6);color:#4B1528}

.bottom-bar{padding:10px 20px 24px;border-top:1px solid #F9EEF3;display:flex;gap:8px;background:#fff}
.bar-btn{flex:1;padding:12px 6px;border-radius:var(--radius-sm);border:1.5px solid #F4C0D1;background:#fff;font-size:11px;font-weight:600;color:#888780;cursor:pointer;transition:all .15s}
.bar-btn:active{transform:scale(.97)}
.bar-btn.review-on{background:#FCEBEB;color:#A32D2D;border-color:#F7C1C1}

.empty{text-align:center;padding:40px 20px}
.empty .emoji{font-size:44px;margin-bottom:14px}
.empty p{color:#888780;font-size:15px;line-height:1.6}

/* COMPLETE OVERLAY */
.overlay{position:fixed;inset:0;background:rgba(253,248,245,.95);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:28px 24px;z-index:100;animation:popIn .3s cubic-bezier(.34,1.56,.64,1)}
.overlay.hidden{display:none}
@keyframes popIn{from{opacity:0;transform:scale(.9)}to{opacity:1;transform:scale(1)}}
.ov-icon{font-size:60px;margin-bottom:12px}
.ov-title{font-size:24px;font-weight:700;background:linear-gradient(135deg,#D4537E,#7F77DD);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:6px;text-align:center}
.ov-sub{font-size:14px;color:#888780;margin-bottom:22px;text-align:center;line-height:1.6}
.ov-stats{display:flex;gap:10px;margin-bottom:24px;width:100%}
.ov-stat{flex:1;background:#fff;border:1.5px solid #F4C0D1;border-radius:var(--radius-sm);padding:14px;text-align:center}
.ov-stat .v{font-size:26px;font-weight:700;color:#D4537E}
.ov-stat.w .v{color:#E24B4A}
.ov-stat.d .v{color:#7F77DD}
.ov-stat .l{font-size:11px;color:#888780;margin-top:2px}
.ov-btns{display:flex;flex-direction:column;gap:10px;width:100%}
.ov-btn{padding:16px;border-radius:var(--radius-sm);border:none;font-size:15px;font-weight:700;cursor:pointer;transition:all .15s}
.ov-btn:active{transform:scale(.97)}
.ov-wrong{background:linear-gradient(135deg,#E24B4A,#F09595);color:#fff}
.ov-next{background:linear-gradient(135deg,#F4C0D1,#CECBF6);color:#4B1528}
.ov-retry{background:#F4EEF9;color:#534AB7}

/* MILESTONE POPUP */
.milestone{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;z-index:200;background:rgba(253,248,245,.9);animation:popIn .35s cubic-bezier(.34,1.56,.64,1)}
.milestone.hidden{display:none}
.ms-box{background:#fff;border-radius:24px;border:2px solid #F4C0D1;padding:32px 28px;text-align:center;max-width:300px;width:100%}
.ms-stars{font-size:32px;letter-spacing:6px;margin-bottom:10px}
.ms-num{font-size:52px;font-weight:700;background:linear-gradient(135deg,#D4537E,#7F77DD);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1}
.ms-label{font-size:14px;color:#888780;margin:4px 0 6px}
.ms-msg{font-size:18px;font-weight:700;color:#2C2C2A;margin-bottom:20px;line-height:1.4}
.ms-close{width:100%;padding:14px;border-radius:var(--radius-sm);border:none;background:linear-gradient(135deg,#F4C0D1,#CECBF6);color:#4B1528;font-size:15px;font-weight:700;cursor:pointer}
</style>
</head>
<body>

<div class="header">
  <div class="logo">✨ 스포츠지도사</div>
  <div class="mode-pill" id="modePill">전체</div>
</div>

<div class="subjects-wrap">
  <button class="scroll-arrow" id="arrowL" onclick="scrollSubj(-1)" aria-label="이전 과목">◀</button>
  <div class="subjects" id="subjectBar"></div>
  <button class="scroll-arrow" id="arrowR" onclick="scrollSubj(1)" aria-label="다음 과목">▶</button>
</div>

<div class="progress-wrap">
  <div class="progress-row">
    <span class="progress-label" id="progressText">1 / 20</span>
    <span class="progress-right" id="wrongCount">오답 0개</span>
  </div>
  <div class="progress-track"><div class="progress-bar" id="progressBar" style="width:5%"></div></div>
</div>

<div class="counter-strip">
  <div class="c-pill"><div class="v" id="statTotal">0</div><div class="l">전체</div></div>
  <div class="c-pill wrong-pill"><div class="v" id="statWrong">0</div><div class="l">오답</div></div>
  <div class="c-pill done-pill"><div class="v" id="statDone">0%</div><div class="l">정답률</div></div>
  <div class="c-pill"><div class="v" id="statCount">0</div><div class="l">푼 횟수</div></div>
</div>

<div class="card-area" id="cardArea"></div>

<div class="btn-row">
  <button class="btn btn-prev" id="btnPrev" onclick="navigate(-1)">◀<span class="lbl">이전</span></button>
  <button class="btn btn-wrong" id="btnWrong" onclick="toggleWrong()">✕<span class="lbl">오답</span></button>
  <button class="btn btn-next" id="btnNext" onclick="navigate(1)">▶<span class="lbl">다음</span></button>
</div>

<div class="bottom-bar">
  <button class="bar-btn" id="btnReview" onclick="toggleReview()">❌ 오답만</button>
  <button class="bar-btn" onclick="shuffle()">🔀 섞기</button>
  <button class="bar-btn" onclick="resetWrong()">🔄 초기화</button>
</div>

<!-- 과목 완료 오버레이 -->
<div class="overlay hidden" id="completeOv">
  <div class="ov-icon" id="ovIcon">🎯</div>
  <div class="ov-title" id="ovTitle">완료!</div>
  <div class="ov-sub" id="ovSub"></div>
  <div class="ov-stats" id="ovStats"></div>
  <div class="ov-btns" id="ovBtns"></div>
</div>

<!-- 마일스톤 팝업 -->
<div class="milestone hidden" id="milestoneBox">
  <div class="ms-box">
    <div class="ms-stars" id="msStars">⭐⭐⭐</div>
    <div class="ms-num" id="msNum">100</div>
    <div class="ms-label">문제 돌파!</div>
    <div class="ms-msg" id="msMsg">정말 대단해요! 🎉</div>
    <button class="ms-close" onclick="closeMilestone()">계속하기 💪</button>
  </div>
</div>

<script>
const SUBJS=['운동생리','운동방법론','해부학','영양','스포츠윤리','응급처치','지도방법'];
const ALL_SUBJS=['전체',...SUBJS];

const MILESTONES=[
  {n:45,  stars:'⭐⭐',   msg:'좋은 출발이에요! 계속 달려봐요 🏃‍♀️'},
  {n:100, stars:'⭐⭐⭐',  msg:'100문제 돌파! 정말 대단해요 🎉'},
  {n:200, stars:'🌟🌟🌟', msg:'200문제! 실력이 쑥쑥 크고 있어요 💪'},
  {n:300, stars:'✨✨✨✨', msg:'300문제! 합격이 보이기 시작했어요 👑'},
  {n:1000,stars:'🏆🏆🏆🏆🏆',msg:'1000문제 완전 정복! 당신은 전설입니다 🥇'},
];
const passedMilestones=new Set();

const D=[];
function q(s,q,a){D.push({s,q,a,w:false});}

const EP='운동생리';
q(EP,'ATP-PC 시스템을 설명하세요.','ATP-PC 시스템은 10초 이내의 짧고 폭발적인 운동에서 사용하는 무산소 에너지 시스템입니다. 몸 안에 저장된 ATP와 크레아틴인산을 사용하며, 100m 달리기나 고중량 웨이트 운동에서 주로 사용됩니다.');
q(EP,'유산소 운동과 무산소 운동의 차이는?','유산소 운동은 산소를 사용해 오랫동안 지속하는 운동이고, 무산소 운동은 산소 없이 짧고 강하게 수행하는 운동입니다. 유산소는 걷기나 조깅이 대표적이고, 무산소는 스프린트나 웨이트트레이닝이 대표적입니다.');
q(EP,'DOMS를 설명하세요.','DOMS는 지연성 근육통으로 운동 후 24~72시간 사이 발생하는 근육통입니다. 특히 익숙하지 않은 고강도 운동이나 신장성 수축 후 많이 나타납니다.');
q(EP,'근비대 원리를 설명하세요.','근비대는 운동 중 발생한 근육 손상이 회복되는 과정에서 근육 크기가 증가하는 현상입니다. 충분한 휴식과 영양 섭취가 함께 이루어져야 효과적으로 발생합니다.');
q(EP,'속근과 지근의 차이는?','속근은 폭발적인 힘을 내는 데 유리하지만 쉽게 피로해지고, 지근은 힘은 약하지만 오래 버티는 지구력 운동에 유리합니다.');

const EM='운동방법론';
q(EM,'점진적 과부하 원리를 설명하세요.','점진적 과부하는 운동 강도를 점차 증가시켜 신체 적응을 유도하는 원리입니다. 중량, 반복수, 세트 수 등을 조금씩 증가시켜 근력과 근비대를 향상시킵니다.');
q(EM,'과훈련이란 무엇인가요?','과훈련은 회복보다 운동량이 많아 피로가 누적된 상태입니다. 운동 수행능력 저하, 무기력감, 수면장애 등이 나타날 수 있습니다.');
q(EM,'드롭세트를 설명하세요.','드롭세트는 한 세트를 실패지점까지 수행한 뒤 중량을 낮춰 쉬지 않고 추가 반복하는 훈련 방법입니다. 근육 피로도를 높여 근비대에 도움을 줄 수 있습니다.');
q(EM,'워밍업의 중요성을 설명하세요.','워밍업은 체온과 심박수를 올려 운동 준비 상태를 만드는 과정입니다. 부상 예방과 운동 수행능력 향상에 도움이 됩니다.');
q(EM,'프리웨이트의 장점을 설명하세요.','프리웨이트는 균형감각과 보조근 사용에 도움이 됩니다. 머신보다 실제 움직임과 비슷해 기능적인 운동 효과를 얻을 수 있습니다.');

const AN='해부학';
q(AN,'대흉근의 기능을 설명하세요.','대흉근은 팔을 몸 안쪽으로 모으는 기능을 합니다. 벤치프레스나 푸쉬업 동작에서 주로 사용됩니다.');
q(AN,'광배근의 역할을 설명하세요.','광배근은 팔을 아래로 당기고 몸쪽으로 모으는 역할을 합니다. 턱걸이와 랫풀다운 운동에서 많이 사용됩니다.');
q(AN,'햄스트링의 기능을 설명하세요.','햄스트링은 무릎을 굽히고 고관절을 뒤로 보내는 역할을 합니다. 달리기나 데드리프트 동작에서 중요하게 사용됩니다.');
q(AN,'코어 근육의 중요성을 설명하세요.','코어 근육은 몸통을 안정화하고 자세를 유지하는 데 중요합니다. 코어가 약하면 허리 부상 위험이 증가할 수 있습니다.');
q(AN,'회전근개란 무엇인가요?','회전근개는 어깨 관절을 안정화하는 근육들입니다. 어깨 움직임과 부상 예방에 중요한 역할을 합니다.');

const NU='영양';
q(NU,'단백질의 역할을 설명하세요.','단백질은 근육 성장과 회복에 중요한 영양소입니다. 운동 후 손상된 근육 회복과 근합성에 도움을 줍니다.');
q(NU,'탄수화물의 역할을 설명하세요.','탄수화물은 운동 시 사용하는 주요 에너지원입니다. 부족하면 운동 수행능력이 떨어질 수 있습니다.');
q(NU,'벌크업 식단을 설명하세요.','벌크업은 근육 증가를 위해 소비 칼로리보다 더 많이 섭취하는 식단 방식입니다. 충분한 단백질과 탄수화물 섭취가 중요합니다.');
q(NU,'컷팅 식단을 설명하세요.','컷팅은 체지방 감소를 위해 섭취 칼로리를 줄이는 식단 방식입니다. 근손실을 최소화하기 위해 단백질 섭취가 중요합니다.');
q(NU,'수분섭취의 중요성을 설명하세요.','수분은 체온조절과 운동 수행능력 유지에 중요합니다. 탈수가 발생하면 피로감과 운동능력 저하가 나타날 수 있습니다.');

const SY='스포츠윤리';
q(SY,'스포츠윤리의 중요성을 설명하세요.','스포츠윤리는 공정성과 존중을 지키기 위해 중요합니다. 지도자는 회원의 안전과 인권을 우선해야 합니다.');
q(SY,'도핑의 문제점을 설명하세요.','도핑은 공정성을 해치고 건강에도 위험합니다. 스포츠 정신에 어긋나는 행동이며 부작용 위험도 큽니다.');
q(SY,'성희롱 예방 방법을 설명하세요.','불필요한 신체접촉을 피하고 회원을 존중하는 태도가 중요합니다. 운동 지도 시 충분한 설명과 동의를 구해야 합니다.');
q(SY,'지도자의 역할을 설명하세요.','지도자는 회원 건강과 안전을 책임지고 올바른 운동 방법을 지도해야 합니다. 또한 동기부여와 상담 역할도 중요합니다.');
q(SY,'좋은 지도자의 조건은?','전문성과 책임감, 소통 능력이 중요합니다. 회원 상태를 이해하고 안전하게 지도할 수 있어야 합니다.');

const FA='응급처치';
q(FA,'CPR 순서를 설명하세요.','먼저 의식을 확인하고 119에 신고합니다. 이후 AED를 요청하고 가슴압박을 시행합니다.');
q(FA,'RICE 처치를 설명하세요.','RICE는 휴식, 냉찜질, 압박, 거상 순서로 시행하는 응급처치 방법입니다. 염좌 같은 부상 초기에 사용합니다.');
q(FA,'탈수 증상을 설명하세요.','탈수가 발생하면 어지럼증, 피로감, 근육경련 등이 나타날 수 있습니다. 충분한 수분섭취가 중요합니다.');
q(FA,'열사병 대처법을 설명하세요.','시원한 장소로 이동 후 체온을 낮춰야 합니다. 심한 경우 즉시 병원으로 이송해야 합니다.');
q(FA,'운동 중 어지럼증 발생 시 대처는?','즉시 운동을 중단하고 안정을 취해야 합니다. 증상이 지속되면 의료진 확인이 필요합니다.');

const CM='지도방법';

q(CM,'스쿼트 시 무릎이 안으로 모이는 이유는?','둔근 약화나 잘못된 자세 때문입니다. 엉덩이 근육 강화와 자세 교정이 필요합니다.');
q(CM,'데드리프트 시 허리가 말리는 이유는?','코어 근육 부족과 유연성 부족 때문입니다. 중량을 낮추고 자세부터 교정해야 합니다.');
q(CM,'회원 동기부여 방법을 설명하세요.','현실적인 목표 설정과 긍정적인 피드백이 중요합니다. 작은 성공 경험을 만들어주는 것이 도움이 됩니다.');

const KH='한국체육사_삭제';
q(KH,'한국 체육사 연구의 의의는?','과거 체육 활동의 기록과 교훈을 통해 현재·미래 체육 발전 방향 모색. 민족 정체성 확인, 스포츠 전통 계승, 역사적 맥락에서 체육 정책 평가의 근거 제공.');
q(KH,'삼국 시대 고구려의 대표적 신체 활동은?','씨름(角力), 수박(手搏, 맨손 무예), 기마술, 궁술. 무천(舞天) 등 제천 행사에서 신체 활동이 종교·군사·오락 기능을 함께 수행했다. 고분벽화에 씨름 장면이 묘사됨.');
q(KH,'조선 시대 무과(武科) 시험의 주요 종목은?','기사(기마 궁술), 기창(기마 창술), 격구(폴로형 말타기), 보사(弓術), 편추(편사), 강서(병서 암송). 군사 역량 평가가 목적. 문과 중심 사회에서 무예 교육의 공식 제도.');
q(KH,'조선 시대 택견(脚戱)의 특징은?','발을 주로 사용하는 전통 무예. 유연하고 리드미컬한 동작. 주로 민간에서 전승. 2011년 유네스코 인류무형문화유산 등재. 현대 태권도 발전에 영향을 준 것으로 평가된다.');
q(KH,'개화기(1876~1910) 한국 근대 체육의 특징은?','서양 스포츠 유입(YMCA 통해 야구·농구 등 도입), 근대 학교 체육 시작(1895년 소학교령), 관립 사범학교 체조 과목 개설. 신체 단련을 통한 부국강병 논리와 연결됨.');
q(KH,'일제 강점기(1910~1945) 체육의 이중적 성격은?','억압: 민족 체육 말살·일본 동화 목적 체육 강요. 저항: 조선체육회(1920) 창립, 마라톤 손기정의 베를린 올림픽 우승(1936)이 민족 자긍심 고양. 체육이 저항 정체성의 상징이 됨.');
q(KH,'1936년 베를린 올림픽 손기정의 역사적 의의는?','마라톤 금메달(2시간 29분 19초). 일장기 말소 사건(동아일보·조선중앙일보 사진에서 일장기 지움). 한국 스포츠 역사상 최초 올림픽 금메달. 일제 강점기 민족 의식 고취의 상징.');
q(KH,'광복 이후(1945~1960) 한국 체육의 재건 과정은?','1945년 조선체육회 재건, 1948년 런던 올림픽 한국 최초 독립 국가로 참가. 6·25 전쟁으로 체육 중단 → 1960년대 재건. 국가 주도 엘리트 스포츠 육성 체계 형성.');
q(KH,'1988년 서울 올림픽이 한국 체육·사회에 미친 영향은?','생활 체육 인식 확산, 스포츠 인프라 대규모 확충, 국제 스포츠 위상 제고, 경제적 효과. "서울 올림픽 특수"로 체육 시설 보급 가속. 88올림픽 이후 생활체육 제도화 시작');
q(KH,'국민체육진흥법(1962)의 의의는?','한국 최초의 체육 전문 법률. 엘리트 선수 육성, 체육 시설 확충, 국가 대표 관리 법적 근거 마련. 이후 국민체육진흥공단(1989) 설립의 토대. 체육 국가 주도 체계의 법적 기반');
q(KH,'태권도가 국기(國技)로 지정된 시기와 올림픽 정식 종목이 된 시기는?','국기: 1971년 지정. 올림픽 시범: 1988 서울, 1992 바르셀로나. 정식 종목: 2000년 시드니 올림픽. 현재 세계 200여 개국 보급, 국제태권도연맹(WT) 주관.');
q(KH,'조선 시대 활쏘기(弓術)의 사회적 기능은?','무예·국방의 실용적 기능 외에 군자의 예절(禮)을 실천하는 수양 활동. 향사례(鄕射禮)는 지역 공동체 결속 강화. "활쏘기는 덕을 기른다"는 유교적 체육 관념 반영');
q(KH,'근대 올림픽 부활(1896)이 한국 체육에 미친 영향은?','서양 스포츠 수용 가속화. 올림픽 참가를 통한 국제 사회 편입 욕구. 식민지 시기에는 올림픽 성과가 민족 존재 증명 수단으로 기능함. 해방 이후 올림픽 참가가 국가 목표가 됨.');
q(KH,'조선 시대 씨름(角力)의 전통과 현대적 계승은?','단오·추석 등 명절 행사에서 마을 단위로 실시. 장사에게는 황소 상품. 현대: 씨름 협회 주관 전국대회, 백두·한라·태백 체급 구분. 2018년 유네스코 인류무형유산 남북 공동 등재.');
q(KH,'일제 강점기 조선체육회(1920)의 역할은?','1920년 7월 창립. 전조선야구대회 등 주요 스포츠 대회 주관. 일제 탄압에도 민족 스포츠 활동 지속. 1938년 일제에 의해 강제 해산 → 광복 후 1945년 재건. 대한체육회의 전신');
q(KH,'한국 여성 체육의 발전 과정에서 중요한 전환점은?','1948년 런던 올림픽 여성 선수 첫 참가. 1970~80년대 배구·핸드볼 등 구기 종목 국제 성과. 1988 서울 올림픽 이후 여성 스포츠 대중화. 2000년대 골프·피겨스케이팅 세계 정상급 진출');
q(KH,'한국 체육사에서 "생활체육" 개념이 본격화된 시기와 배경은?','1988 서울 올림픽 이후. 엘리트 스포츠 편중 비판 + 국민 건강 증진 필요성 → 1991년 국민생활체육협의회 창설. 2016년 국민체육진흥법 개정으로 생활체육·전문체육 통합 관리');
q(KH,'삼국시대 백제의 체육 문화가 일본에 미친 영향은?','백제 통해 스모(씨름), 격구, 바둑, 투호 등 전파. 6~7세기 백제 문화 도래인이 일본 궁정 체육 문화 형성에 기여. 한·일 체육사 교류 연구의 중요 주제.');
q(KH,'근대 학교 체육의 시작으로 볼 수 있는 제도는?','1895년 소학교령(소학교에 체조 과목 도입). 1906년 대한제국 관립학교 체조 필수화. 1909년 청년학우회의 체육 강조. 서양 체조·스웨덴식 체조가 초기 학교 체육의 주류였다.');
q(KH,'2002 한·일 FIFA 월드컵의 한국 체육·사회적 의의는?','4강 진출(사상 최초 비유럽·비남미권). 붉은 악마 응원 문화로 시민 자발적 공동체 의식 형성. 스포츠를 통한 국가 정체성 강화. 프로축구 K리그 인기 상승. 도시 인프라 발전 계기');

let cards=D.filter(c=>c.s!=='한국체육사_삭제');
let filtered=[...cards];
let current=0;
let reviewMode=false;
let currentSubj='전체';
let isFlipped=false;
let solveCount=0;

function getWrongCount(){return cards.filter(c=>c.w).length;}
function getFiltered(){
  let b=reviewMode?cards.filter(c=>c.w):cards;
  if(currentSubj!=='전체') b=b.filter(c=>c.s===currentSubj);
  return b;
}
function isSubjEnd(){return currentSubj!=='전체'&&!reviewMode&&current===filtered.length-1;}

function scrollSubj(dir){
  const bar=document.getElementById('subjectBar');
  bar.scrollBy({left:dir*120,behavior:'smooth'});
  setTimeout(updateArrows,300);
}
function updateArrows(){
  const bar=document.getElementById('subjectBar');
  const l=document.getElementById('arrowL');
  const r=document.getElementById('arrowR');
  if(!l||!r)return;
  l.classList.toggle('disabled',bar.scrollLeft<=2);
  r.classList.toggle('disabled',bar.scrollLeft+bar.clientWidth>=bar.scrollWidth-2);
}

function buildBar(){
  const bar=document.getElementById('subjectBar');
  bar.innerHTML='';
  ALL_SUBJS.forEach(s=>{
    const hasW=s==='전체'?cards.some(c=>c.w):cards.filter(c=>c.s===s).some(c=>c.w);
    const btn=document.createElement('button');
    btn.className='subj-btn'+(s===currentSubj?' active':'')+(hasW?' has-wrong':'');
    btn.textContent=s==='전체'?'전체 ✦':s;
    btn.onclick=()=>{currentSubj=s;current=0;isFlipped=false;let tx=0;};
    bar.appendChild(btn);
  });
  setTimeout(()=>{
    const active=bar.querySelector('.active');
    if(active)active.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'});
    updateArrows();
  },50);
  bar.addEventListener('scroll',updateArrows,{passive:true});
}

function updateStats(){
  const t=cards.length,w=getWrongCount();
  document.getElementById('statTotal').textContent=t;
  document.getElementById('statWrong').textContent=w;
  document.getElementById('statDone').textContent=t>0?Math.round((t-w)/t*100)+'%':'0%';
  document.getElementById('statCount').textContent=solveCount;
  document.getElementById('wrongCount').textContent='오답 '+w+'개';
}

function renderCard(){
  filtered=getFiltered();
  const area=document.getElementById('cardArea');
  if(filtered.length===0){
    area.innerHTML=`<div class="empty"><div class="emoji">${reviewMode?'🎉':'🌸'}</div><p>${reviewMode?'<strong>오답이 없어요!</strong><br>완벽해요 ✨':'카드가 없어요.'}</p></div>`;
    document.getElementById('progressText').textContent='0 / 0';
    document.getElementById('progressBar').style.width='0%';
    document.getElementById('btnWrong').disabled=true;
    document.getElementById('btnPrev').disabled=true;
    document.getElementById('btnNext').disabled=true;
    return;
  }
  if(current>=filtered.length)current=filtered.length-1;
  if(current<0)current=0;
  const card=filtered[current];
  const pct=Math.round((current+1)/filtered.length*100);
  document.getElementById('progressText').textContent=(current+1)+' / '+filtered.length;
  document.getElementById('progressBar').style.width=pct+'%';
  document.getElementById('btnWrong').disabled=false;
  document.getElementById('btnWrong').className='btn btn-wrong'+(card.w?' marked':'');
  document.getElementById('btnPrev').disabled=current===0;
  const nb=document.getElementById('btnNext');
  if(isSubjEnd()){
    nb.disabled=false;
    nb.innerHTML='✓<span class="lbl">완료!</span>';
    nb.style.background='linear-gradient(135deg,#9FE1CB,#CECBF6)';
  } else {
    nb.disabled=current===filtered.length-1;
    nb.innerHTML='▶<span class="lbl">다음</span>';
    nb.style.background='';
  }
  area.innerHTML=`
    <div class="subj-tag">${card.s}</div>
    <div class="card-scene">
      <div class="card-inner${isFlipped?' flipped':''}" id="ci" onclick="flipCard()">
        <div class="card-face card-front${card.w?' is-wrong':''}">
          ${card.w?'<div class="wrong-dot">✕</div>':''}
          <div class="card-label">Question</div>
          <div class="card-text">${card.q}</div>
        </div>
        <div class="card-face card-back">
          <div class="card-label">Answer</div>
          <div class="card-text">${card.a}</div>
        </div>
      </div>
    </div>
    <div class="tap-hint">탭해서 뒤집기 💫</div>
  `;
}

function flipCard(){
  isFlipped=!isFlipped;
  const ci=document.getElementById('ci');
  if(ci)ci.classList.toggle('flipped',isFlipped);
}

function countUp(){
  solveCount++;
  document.getElementById('statCount').textContent=solveCount;
  checkMilestone(solveCount);
}

function checkMilestone(n){
  const m=MILESTONES.find(m=>m.n===n&&!passedMilestones.has(n));
  if(!m)return;
  passedMilestones.add(n);
  document.getElementById('msStars').textContent=m.stars;
  document.getElementById('msNum').textContent=n.toLocaleString();
  document.getElementById('msMsg').textContent=m.msg;
  document.getElementById('milestoneBox').classList.remove('hidden');
}

function closeMilestone(){
  document.getElementById('milestoneBox').classList.add('hidden');
}

function navigate(dir){
  if(dir===1&&isSubjEnd()){showComplete();return;}
  if(dir===1&&current<filtered.length-1){
    countUp();
    isFlipped=false;
    current++;
    renderCard();
  } else if(dir===-1&&current>0){
    isFlipped=false;
    current--;
    renderCard();
  }
}

function toggleWrong(){
  filtered=getFiltered();
  if(!filtered.length)return;
  const card=filtered[current];
  const idx=cards.findIndex(c=>c.q===card.q&&c.s===card.s);
  if(idx!==-1)cards[idx].w=!cards[idx].w;
  countUp();
  if(reviewMode&&!cards[idx].w){
    filtered=getFiltered();
    if(current>=filtered.length)current=Math.max(0,filtered.length-1);
  }
  updateStats();
  buildBar();
  renderCard();
}

function showComplete(){
  filtered=getFiltered();
  const total=filtered.length;
  const wrongN=filtered.filter(c=>c.w).length;
  const correct=total-wrongN;
  const pct=Math.round(correct/total*100);
  const emoji=pct>=80?'🏆':pct>=60?'💪':'📚';
  document.getElementById('ovIcon').textContent=emoji;
  document.getElementById('ovTitle').textContent=currentSubj+' 완료!';
  document.getElementById('ovSub').textContent=total+'문제를 모두 학습했어요 🌸';
  document.getElementById('ovStats').innerHTML=`
    <div class="ov-stat"><div class="v">${total}</div><div class="l">전체</div></div>
    <div class="ov-stat w"><div class="v">${wrongN}</div><div class="l">오답</div></div>
    <div class="ov-stat d"><div class="v">${pct}%</div><div class="l">정답률</div></div>
  `;
  const subjIdx=SUBJS.indexOf(currentSubj);
  const nextSubj=subjIdx>=0&&subjIdx<SUBJS.length-1?SUBJS[subjIdx+1]:null;
  let btns='';
  if(wrongN>0)btns+=`<button class="ov-btn ov-wrong" onclick="startWrongReview()">❌ 오답 ${wrongN}개 복습하기</button>`;
  if(nextSubj)btns+=`<button class="ov-btn ov-next" onclick="goNext('${nextSubj}')">다음 과목: ${nextSubj} →</button>`;
  btns+=`<button class="ov-btn ov-retry" onclick="retrySubj()">🔄 처음부터 다시</button>`;
  document.getElementById('ovBtns').innerHTML=btns;
  document.getElementById('completeOv').classList.remove('hidden');
}

function hideComplete(){document.getElementById('completeOv').classList.add('hidden');}
function startWrongReview(){hideComplete();reviewMode=true;current=0;isFlipped=false;document.getElementById('btnReview').classList.add('review-on');document.getElementById('modePill').className='mode-pill wrong';document.getElementById('modePill').textContent='오답 모드';refresh();}
function goNext(s){hideComplete();currentSubj=s;reviewMode=false;current=0;isFlipped=false;document.getElementById('btnReview').classList.remove('review-on');document.getElementById('modePill').className='mode-pill';document.getElementById('modePill').textContent='전체';refresh();}
function retrySubj(){hideComplete();current=0;isFlipped=false;renderCard();}

function toggleReview(){
  reviewMode=!reviewMode;current=0;isFlipped=false;
  document.getElementById('btnReview').classList.toggle('review-on',reviewMode);
  document.getElementById('modePill').className='mode-pill'+(reviewMode?' wrong':'');
  document.getElementById('modePill').textContent=reviewMode?'오답 모드':'전체';
  refresh();
}

function shuffle(){
  for(let i=cards.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[cards[i],cards[j]]=[cards[j],cards[i]];}
  current=0;isFlipped=false;refresh();
}

function resetWrong(){
  if(!confirm('오답 표시를 모두 초기화할까요?'))return;
  cards.forEach(c=>c.w=false);
  if(reviewMode){reviewMode=false;document.getElementById('btnReview').classList.remove('review-on');document.getElementById('modePill').className='mode-pill';document.getElementById('modePill').textContent='전체';}
  current=0;isFlipped=false;refresh();
}

function refresh(){buildBar();updateStats();renderCard();}

let tx=0;
document.addEventListener('touchstart',e=>{tx=e.touches[0].clientX;},{passive:true});
document.addEventListener('touchend',e=>{
  const dx=e.changedTouches[0].clientX-tx;
  if(Math.abs(dx)>55){if(dx<0&&current<filtered.length-1)navigate(1);else if(dx>0&&current>0)navigate(-1);}
},{passive:true});

refresh();
</script>
</body>
</html>
